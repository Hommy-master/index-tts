services:
  index-tts:
    image: gogoshine/index-tts:latest
    container_name: index-tts
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      # Mount model checkpoints directory
      - ./checkpoints:/app/checkpoints
      # Mount outputs directory for generated audio
      - ./outputs:/app/outputs
      # Mount prompts directory
      - ./prompts:/app/prompts
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
